<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discord Drive</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="icon-cloud" viewBox="0 0 24 24">
        <path d="M17.5 19H8a5 5 0 1 1 1.5-9.8 6 6 0 0 1 11 3.3A3.5 3.5 0 0 1 17.5 19Z" />
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 16V4m0 0 5 5m-5-5-5 5M5 20h14" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 4v12m0 0 5-5m-5 5-5-5M5 20h14" />
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M4 7h16m-10 4v6m4-6v6M6 7l1 14h10l1-14M9 7V4h6v3" />
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
      </symbol>
      <symbol id="icon-log-out" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9" />
      </symbol>
      <symbol id="icon-users" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
        <path d="M22 21v-2a4 4 0 0 0-3-3.9" />
        <path d="M16 3.1a4 4 0 0 1 0 7.8" />
      </symbol>
      <symbol id="icon-file" viewBox="0 0 24 24">
        <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9Z" />
        <path d="M14 3v6h6" />
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24">
        <path d="M4 5h16v14H4Z" />
        <path d="m4 16 5-5 4 4 2-2 5 5" />
        <path d="M15 9h.01" />
      </symbol>
      <symbol id="icon-video" viewBox="0 0 24 24">
        <path d="M4 6h11a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4Z" />
        <path d="m17 10 4-2v8l-4-2" />
      </symbol>
      <symbol id="icon-audio" viewBox="0 0 24 24">
        <path d="M9 18V5l10-2v13" />
        <path d="M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm10-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      </symbol>
      <symbol id="icon-text" viewBox="0 0 24 24">
        <path d="M4 6h16M4 12h12M4 18h9" />
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15.5 6.2M3 12A9 9 0 0 1 18.5 5.8" />
        <path d="M18 2v4h4M6 22v-4H2" />
      </symbol>
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path d="m12 3 2.9 5.9 6.5.9-4.7 4.6 1.1 6.5-5.8-3-5.8 3 1.1-6.5-4.7-4.6 6.5-.9Z" />
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <path d="M8 8h12v12H8Z" />
        <path d="M4 16V4h12" />
      </symbol>
      <symbol id="icon-external" viewBox="0 0 24 24">
        <path d="M14 3h7v7" />
        <path d="m10 14 11-11" />
        <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5" />
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h13M8 12h13M8 18h13" />
        <path d="M3 6h.01M3 12h.01M3 18h.01" />
      </symbol>
      <symbol id="icon-grid" viewBox="0 0 24 24">
        <path d="M4 4h7v7H4ZM13 4h7v7h-7ZM4 13h7v7H4ZM13 13h7v7h-7Z" />
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path d="M21 14.2A8 8 0 0 1 9.8 3 8.5 8.5 0 1 0 21 14.2Z" />
      </symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <path d="M12 4V2m0 20v-2m8-8h2M2 12h2m14.4-6.4 1.4-1.4M4.2 19.8l1.4-1.4m0-12.8L4.2 4.2m15.6 15.6-1.4-1.4" />
        <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12" />
      </symbol>
    </svg>

    <main id="auth" class="auth-screen hidden">
      <section class="auth-panel">
        <div class="brand-mark">
          <svg><use href="#icon-cloud"></use></svg>
        </div>
        <p class="eyebrow">Discord Drive</p>
        <h1>你的 Discord 私有檔案庫</h1>
        <p>登入後管理上傳、預覽、下載與收藏檔案。</p>
        <a class="login-button" href="/auth/login">使用 Discord 登入</a>
      </section>
    </main>

    <main id="app" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand-row">
          <span class="brand-icon"><svg><use href="#icon-cloud"></use></svg></span>
          <span>Discord Drive</span>
        </div>

        <button id="dropZone" class="drop-zone" type="button">
          <span class="drop-icon"><svg><use href="#icon-upload"></use></svg></span>
          <span class="drop-copy">
            <strong>上傳檔案</strong>
            <small>多檔案佇列</small>
          </span>
        </button>
        <input id="fileInput" class="file-input" type="file" multiple />

        <section class="meter-block" aria-label="儲存摘要">
          <div>
            <span class="muted">檔案</span>
            <strong id="fileCount">0</strong>
          </div>
          <div>
            <span class="muted">容量</span>
            <strong id="totalSize">0 B</strong>
          </div>
          <div>
            <span class="muted">收藏</span>
            <strong id="favoriteCount">0</strong>
          </div>
        </section>

        <nav id="typeFilters" class="filter-list" aria-label="檔案篩選">
          <button class="filter-button is-active" type="button" data-filter="all">
            <svg><use href="#icon-file"></use></svg><span>全部</span><strong data-count>0</strong>
          </button>
          <button class="filter-button" type="button" data-filter="favorite">
            <svg><use href="#icon-star"></use></svg><span>收藏</span><strong data-count>0</strong>
          </button>
          <button class="filter-button" type="button" data-filter="image">
            <svg><use href="#icon-image"></use></svg><span>圖片</span><strong data-count>0</strong>
          </button>
          <button class="filter-button" type="button" data-filter="video">
            <svg><use href="#icon-video"></use></svg><span>影片</span><strong data-count>0</strong>
          </button>
          <button class="filter-button" type="button" data-filter="audio">
            <svg><use href="#icon-audio"></use></svg><span>音訊</span><strong data-count>0</strong>
          </button>
          <button class="filter-button" type="button" data-filter="text">
            <svg><use href="#icon-text"></use></svg><span>文字</span><strong data-count>0</strong>
          </button>
        </nav>

        <button id="accountAdminButton" class="admin-nav-button hidden" type="button">
          <svg><use href="#icon-users"></use></svg>
          <span>帳號管理</span>
          <strong id="adminUserCount">--</strong>
        </button>

        <section class="queue-section">
          <header>
            <span>上傳佇列</span>
            <button id="clearUploadsButton" class="quiet-button" type="button">清除</button>
          </header>
          <div id="uploadQueue" class="upload-queue"></div>
        </section>

        <div class="account">
          <div id="avatar" class="avatar"></div>
          <div class="account-name">
            <strong id="displayName">--</strong>
            <span id="userName">--</span>
          </div>
          <button id="logoutButton" class="icon-button" type="button" title="登出" aria-label="登出">
            <svg><use href="#icon-log-out"></use></svg>
          </button>
        </div>
      </aside>

      <section class="content">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">My Drive</p>
            <h1>檔案庫</h1>
            <span id="latestActivity" class="title-meta">--</span>
          </div>
          <div class="topbar-actions">
            <label class="search-box">
              <svg><use href="#icon-search"></use></svg>
              <input id="searchInput" type="search" placeholder="搜尋檔案" autocomplete="off" />
            </label>
            <div class="segmented" aria-label="顯示方式">
              <button id="listViewButton" type="button" title="清單" aria-label="清單">
                <svg><use href="#icon-list"></use></svg>
              </button>
              <button id="gridViewButton" type="button" title="格狀" aria-label="格狀">
                <svg><use href="#icon-grid"></use></svg>
              </button>
            </div>
            <button id="refreshButton" class="icon-button" type="button" title="重新整理" aria-label="重新整理">
              <svg><use href="#icon-refresh"></use></svg>
            </button>
            <button id="themeButton" class="icon-button" type="button" title="切換主題" aria-label="切換主題">
              <svg><use href="#icon-moon"></use></svg>
            </button>
          </div>
        </header>

        <section class="control-strip">
          <label class="select-control">
            <span>排序</span>
            <select id="sortSelect">
              <option value="updated-desc">最近更新</option>
              <option value="created-desc">最近建立</option>
              <option value="name-asc">檔名 A-Z</option>
              <option value="size-desc">容量大到小</option>
              <option value="favorite-desc">收藏優先</option>
            </select>
          </label>

          <div id="selectionBar" class="selection-bar hidden">
            <strong id="selectedCount">0 個已選取</strong>
            <button id="bulkDeleteButton" class="text-button danger" type="button">刪除</button>
            <button id="clearSelectionButton" class="icon-button" type="button" title="取消選取" aria-label="取消選取">
              <svg><use href="#icon-x"></use></svg>
            </button>
          </div>
        </section>

        <section class="workspace">
          <div id="filePane" class="file-pane">
            <div class="list-head">
              <label class="check-cell" title="選取目前清單">
                <input id="selectVisibleCheckbox" type="checkbox" />
                <span></span>
              </label>
              <span>名稱</span>
              <span>大小</span>
              <span>更新</span>
              <span>狀態</span>
              <span></span>
            </div>
            <div id="fileList" class="file-list"></div>
            <div id="emptyState" class="empty-state hidden">
              <svg><use href="#icon-cloud"></use></svg>
              <strong id="emptyTitle">還沒有檔案</strong>
              <span id="emptyText">上傳新檔案後會出現在這裡</span>
            </div>
          </div>

          <aside class="preview-pane">
            <div id="previewEmpty" class="preview-empty">
              <svg><use href="#icon-eye"></use></svg>
              <strong>尚未選取</strong>
            </div>
            <div id="previewContent" class="preview-content hidden"></div>
          </aside>
        </section>
      </section>
    </main>

    <dialog id="renameDialog" class="rename-dialog">
      <form id="renameForm" class="dialog-card">
        <header class="dialog-head">
          <strong>重新命名</strong>
          <button id="renameCancelButton" class="icon-button" type="button" title="關閉" aria-label="關閉">
            <svg><use href="#icon-x"></use></svg>
          </button>
        </header>
        <label class="field-label">
          <span>檔名</span>
          <input id="renameInput" type="text" maxlength="160" autocomplete="off" />
        </label>
        <footer class="dialog-actions">
          <button id="renameCloseButton" class="text-button" type="button">取消</button>
          <button id="renameSaveButton" class="login-button" type="submit">儲存</button>
        </footer>
      </form>
    </dialog>

    <dialog id="accountDialog" class="account-dialog">
      <section class="dialog-card account-card">
        <header class="dialog-head">
          <strong>帳號管理</strong>
          <div class="dialog-head-actions">
            <button id="refreshAccountsButton" class="icon-button" type="button" title="重新整理" aria-label="重新整理">
              <svg><use href="#icon-refresh"></use></svg>
            </button>
            <button id="accountCloseButton" class="icon-button" type="button" title="關閉" aria-label="關閉">
              <svg><use href="#icon-x"></use></svg>
            </button>
          </div>
        </header>
        <div class="account-list-head">
          <span>帳號</span>
          <span>狀態</span>
          <span>檔案</span>
          <span></span>
        </div>
        <div id="accountList" class="account-list"></div>
      </section>
    </dialog>

    <div id="toastRegion" class="toast-region" aria-live="polite"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
